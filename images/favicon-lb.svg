<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
    <title id="title">AppStudioLB favicon</title>
    <desc id="desc">LB lettermark favicon for AppStudioLB.</desc>
    <defs>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22d3ee" />
            <stop offset="100%" stop-color="#6366f1" />
        </linearGradient>
        <radialGradient id="glow" cx="75%" cy="20%" r="65%">
            <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
        </radialGradient>
    </defs>

    <rect width="128" height="128" rx="28" fill="#0a0a1a" />
    <rect width="128" height="128" rx="28" fill="url(#glow)" />
    <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.14" />

    <text x="26" y="86" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff">L</text>
    <text x="58" y="86" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#accent)">B</text>
</svg>
